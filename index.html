<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Research Assistant</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            --header-bg: rgba(255, 255, 255, 0.1);
            --chat-bg: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(255, 255, 255, 0.1);
            --text-color: #333;
            --welcome-color: rgba(255, 255, 255, 0.8);
            --user-msg-bg: linear-gradient(45deg, #007bff, #0056b3);
            --ai-msg-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(255, 255, 255, 0.3);
        }
        .light-theme {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #b3e5fc 100%);
            --header-bg: rgba(0, 0, 0, 0.1);
            --chat-bg: rgba(0, 0, 0, 0.05);
            --input-bg: rgba(0, 0, 0, 0.1);
            --text-color: #000;
            --welcome-color: rgba(0, 0, 0, 0.8);
            --user-msg-bg: linear-gradient(45deg, #1976d2, #0d47a1);
            --ai-msg-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.3);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease;
        }
        .header {
            background: var(--header-bg);
            color: white;
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .theme-toggle {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }
        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: var(--chat-bg);
        }
        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            word-wrap: break-word;
            position: relative;
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: var(--user-msg-bg);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        .ai-message {
            background: var(--ai-msg-bg);
            color: var(--text-color);
            align-self: flex-start;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        .input-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
            margin-top: auto;
        }
        #query-input {
            width: 10cm;
            max-width: 90%;
            padding: 15px 20px;
            border: 2px solid var(--border-color);
            border-radius: 30px;
            outline: none;
            font-size: 1em;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            transition: all 0.3s ease;
        }
        #query-input:focus {
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }
        #send-btn {
            background: linear-gradient(45deg, #007bff, #0056b3);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 30px;
            margin-left: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }
        #send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }
        #send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .loading {
            color: #007bff;
            font-style: italic;
            align-self: flex-start;
            display: flex;
            align-items: center;
        }
        .loading::after {
            content: '';
            width: 20px;
            height: 20px;
            border: 2px solid #007bff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .research, .summary {
            margin-top: 10px;
        }
        .research strong, .summary strong {
            color: #007bff;
            font-weight: bold;
        }
        .welcome-message {
            text-align: center;
            color: var(--welcome-color);
            font-style: italic;
            margin-top: 50px;
        }
        .symbols {
            font-size: 2em;
            margin-top: 20px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>AI Research Assistant</div>
        <button class="theme-toggle" id="theme-toggle">Light</button>
    </div>
    <div class="chat-container" id="chat-container">
        <div class="welcome-message">
            <h2>Welcome to AI Research Assistant!</h2>
            <p>Ask me anything, and I'll research the topic and provide a summary.</p>
            <div class="symbols">🔍 📚 🧠 💡</div>
        </div>
        <div class="input-container">
            <input type="text" id="query-input" placeholder="Ask me anything..." />
            <button id="send-btn">Send</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const queryInput = document.getElementById('query-input');
        const sendBtn = document.getElementById('send-btn');
        const themeToggle = document.getElementById('theme-toggle');

        let isDark = true;

        function updateTheme() {
            document.body.className = isDark ? '' : 'light-theme';
            themeToggle.textContent = isDark ? 'Light' : 'Dark';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Load theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            isDark = false;
            updateTheme();
        }

        themeToggle.addEventListener('click', () => {
            isDark = !isDark;
            updateTheme();
        });

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = content;
            chatContainer.insertBefore(messageDiv, document.querySelector('.input-container'));
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function addLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message loading';
            loadingDiv.id = 'loading';
            loadingDiv.textContent = 'Thinking...';
            chatContainer.insertBefore(loadingDiv, document.querySelector('.input-container'));
            chatContainer.scrollTop = chatContainer.scrollHeight;
            sendBtn.disabled = true;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
            sendBtn.disabled = false;
        }

        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            // Remove welcome message on first interaction
            const welcome = document.querySelector('.welcome-message');
            if (welcome) welcome.remove();

            addMessage(query, 'user-message');
            queryInput.value = '';
            addLoading();

            const apiUrl = window.location.protocol.startsWith('http') && window.location.hostname
                ? `${window.location.origin}/workflow`
                : 'http://localhost:8000/workflow';

            try {
                const res = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query }),
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.detail || 'API failed');

                const responseContent = `
                    <div class="answer"><strong>Answer:</strong><br>${data.answer.replace(/\n/g, '<br>')}</div>
                `;
                removeLoading();
                addMessage(responseContent, 'ai-message');
            } catch (err) {
                removeLoading();
                addMessage('Error: ' + err.toString(), 'ai-message');
            }
        }

        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendQuery();
        });
    </script>
</body>
</html>
